# Local PostgreSQL for development.
#
#   docker compose up -d
#
# then push the schema:
#
#   pnpm --filter @workspace/db run push
#
# The default DATABASE_URL in .env.example matches these settings.
services:
  postgres:
    image: postgres:16-alpine
    container_name: media-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
