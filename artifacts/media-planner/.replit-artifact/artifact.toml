kind = "web"
previewPath = "/"
title = "Media Planner"
version = "1.0.0"
id = "artifacts/media-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25085

[services.development]
run = "pnpm --filter @workspace/media-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/media-planner", "run", "build" ]
publicDir = "artifacts/media-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25085"
BASE_PATH = "/"
